name: Update Severe Dashboard

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

  push:
    branches:
      - main

jobs:
  run-dashboard:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests metpy gspread google-auth

      - name: Show trigger type
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Run dashboard script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python main.py
