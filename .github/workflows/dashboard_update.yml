name: Update Severe Dashboard
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system libraries (eccodes, geos, proj)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes0 libeccodes-dev libgeos-dev libproj-dev proj-bin
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests metpy gspread google-auth netCDF4
          pip install pygrib cartopy matplotlib google-api-python-client
      - name: Show trigger type
        run: echo "Triggered by ${{ github.event_name }}"
      - name: Run dashboard script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          NCEI_CDO_TOKEN: ${{ secrets.NCEI_CDO_TOKEN }}
          GLWU_DRIVE_FOLDER_ID: ${{ secrets.GLWU_DRIVE_FOLDER_ID }}
        run: python main.py
